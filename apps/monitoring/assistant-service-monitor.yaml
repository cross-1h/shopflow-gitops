apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: assistant-service
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: assistant-service
  namespaceSelector:
    matchNames:
      - shopflow
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
