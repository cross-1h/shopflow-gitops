# Desired state, watched by ArgoCD. Changing this file and committing IS the deploy.
#
# EDIT: put your RDS endpoint host here (from Project 6 `terraform output rds_endpoint`).
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopflow-config
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://REPLACE_RDS_ENDPOINT:5432/shopflow"
  ORDER_EVENTS_QUEUE_NAME: "shopflow-order-events"
  AWS_REGION: "us-east-1"
